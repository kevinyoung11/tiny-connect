# Fly.io deployment — https://fly.io/docs
#
# First deploy:
#   fly launch --no-deploy   (imports this file, pick your app name)
#   fly deploy
#
# Subsequent deploys happen automatically when main is merged
# if you connect via: fly deploy --remote-only in a GitHub Action.
#
# SSH keys are stored in the container filesystem and reset on each
# deploy. For persistence, attach a volume:
#   fly volumes create tiny_connect_data --size 1 --region hkg
# then set KEYS_DIR=/data/.keys in [env] below.

app = "tiny-connect"
primary_region = "hkg"

[build]

[env]
  PORT = "8080"

[http_service]
  internal_port = 8080
  force_https = true
  # Machine sleeps when idle; wakes in ~1-2 s on next request.
  # Set min_machines_running = 1 to stay always-on (still free within Fly allowance).
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

  [http_service.concurrency]
    type = "connections"
    hard_limit = 25
    soft_limit = 20

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory = "256mb"
