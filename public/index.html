<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>YY Terminal</title>
    <link rel="stylesheet" href="/xterm/css/xterm.css" />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="app">
      <form id="connectForm" class="connect-form" autocomplete="off">
        <select id="mode" aria-label="Connection mode">
          <option value="local">Local</option>
          <option value="ssh">SSH</option>
        </select>
        <input id="host" data-ssh-field type="text" placeholder="Host" />
        <input id="port" data-ssh-field type="number" inputmode="numeric" placeholder="22" value="22" />
        <input id="username" data-ssh-field type="text" placeholder="Username" />
        <select id="keyId" data-ssh-field aria-label="SSH key"></select>
        <input id="passphrase" data-ssh-field type="password" placeholder="Passphrase 可选" />
        <button type="submit">Connect</button>
      </form>
      <form id="keyForm" class="key-form" autocomplete="off">
        <input id="keyName" type="text" placeholder="Key name" />
        <textarea id="privateKey" placeholder="Paste private key"></textarea>
        <button type="submit">Save Key</button>
      </form>
      <header class="toolbar">
        <div class="brand">
          <strong>YY Terminal</strong>
          <span id="status">connecting</span>
        </div>
        <div class="actions">
          <button type="button" data-send="\u0003" title="Ctrl-C">Ctrl-C</button>
          <button type="button" data-send="\u001b" title="Esc">Esc</button>
          <button type="button" data-send="\u0015" title="Ctrl-U">Ctrl-U</button>
          <button type="button" id="paste">Paste</button>
        </div>
      </header>
      <section id="terminal" aria-label="Terminal"></section>
      <form id="commandBar" class="command-bar" autocomplete="off">
        <input id="commandInput" type="text" placeholder="输入命令，回车发送" />
        <button type="submit">Send</button>
      </form>
    </main>
    <script type="module" src="/client.js"></script>
  </body>
</html>
