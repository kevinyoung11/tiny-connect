<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1" />
    <meta name="theme-color" content="#09090d" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="mobile-web-app-capable" content="yes" />
    <title>TinyConnect</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@xterm/xterm@5.5.0/css/xterm.css" />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>

    <!-- Backdrop -->
    <div class="backdrop" id="backdrop"></div>

    <!-- Connection modal -->
    <div class="modal" id="connectModal" role="dialog" aria-modal="true" aria-label="New Connection">
      <div class="modal-brand">
        <div class="modal-icon">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/>
            <polyline points="15 3 21 3 21 9"/>
            <line x1="10" y1="14" x2="21" y2="3"/>
          </svg>
        </div>
        <div>
          <h1 class="modal-title">TinyConnect</h1>
          <p class="modal-sub">SSH Terminal</p>
        </div>
      </div>

      <form id="connectForm" autocomplete="off" novalidate>
        <div class="mode-tabs" role="tablist">
          <button type="button" class="tab active" data-mode="ssh" role="tab" aria-selected="true">SSH</button>
          <button type="button" class="tab" data-mode="saved" role="tab" aria-selected="false">Saved</button>
        </div>

        <div class="saved-panel" id="savedPanel" hidden>
          <div class="field" style="flex:1">
            <label for="profileSelect">Saved Connections</label>
            <select id="profileSelect"></select>
          </div>
          <button type="button" class="btn-icon btn-icon--danger" id="deleteProfileBtn" title="Delete profile" hidden>
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="3 6 5 6 21 6"/>
              <path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/>
              <path d="M10 11v6M14 11v6"/>
              <path d="M9 6V4h6v2"/>
            </svg>
          </button>
        </div>

        <div id="sshFields">
          <div class="field-row">
            <div class="field" style="flex:1">
              <label for="host">Host</label>
              <input id="host" type="text" placeholder="192.168.1.1" autocapitalize="none" autocorrect="off" spellcheck="false" inputmode="url" />
            </div>
            <div class="field" style="flex:0 0 80px">
              <label for="port">Port</label>
              <input id="port" type="number" inputmode="numeric" placeholder="22" value="22" />
            </div>
          </div>
          <div class="field">
            <label for="username">Username</label>
            <input id="username" type="text" placeholder="root" autocapitalize="none" autocorrect="off" spellcheck="false" />
          </div>
          <div class="field">
            <label>SSH Key</label>
            <div class="key-row">
              <select id="keyId"></select>
              <button type="button" class="btn-icon" id="addKeyBtn" title="Add new key">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round">
                  <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
                </svg>
              </button>
              <button type="button" class="btn-icon btn-icon--danger" id="deleteKeyBtn" title="Delete key" hidden>
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                  <polyline points="3 6 5 6 21 6"/>
                  <path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/>
                </svg>
              </button>
            </div>
          </div>
          <div class="field">
            <label for="passphrase">Passphrase <span class="label-opt">optional</span></label>
            <input id="passphrase" type="password" placeholder="••••••••" />
          </div>
          <div class="profile-save-panel" id="profileSavePanel">
            <input id="profileNameInput" type="text" placeholder="Profile name, e.g. My Server" autocapitalize="words" autocorrect="off" />
            <button type="button" class="btn-save-confirm" id="profileSaveConfirm">Save</button>
            <button type="button" class="btn-save-cancel" id="profileSaveCancel">✕</button>
          </div>
          <div class="field field--toggle">
            <label for="useTmux">Use tmux <span class="label-opt">session persistence</span></label>
            <label class="toggle-switch">
              <input type="checkbox" id="useTmux" />
              <span class="toggle-track"></span>
            </label>
          </div>
        </div>

        <button type="submit" class="btn-connect" id="connectBtn">
          <span class="btn-label">Connect</span>
          <span class="spinner" id="spinner" hidden></span>
        </button>
      </form>
    </div>

    <!-- Add key sheet -->
    <div class="sheet" id="keySheet" role="dialog" aria-modal="true" aria-label="Add SSH Key" hidden>
      <div class="sheet-handle"></div>
      <div class="sheet-head">
        <h2 class="sheet-title">Add SSH Key</h2>
        <button type="button" class="btn-x" id="closeKeySheet" aria-label="Close">
          <svg width="12" height="12" viewBox="0 0 12 12" fill="currentColor">
            <path d="M1.5 1.5l9 9M10.5 1.5l-9 9" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
          </svg>
        </button>
      </div>
      <form id="keyForm" autocomplete="off">
        <div class="field">
          <label for="keyName">Key Name</label>
          <input id="keyName" type="text" placeholder="My Server" autocapitalize="words" />
        </div>
        <div class="field">
          <label for="privateKey">Private Key</label>
          <textarea id="privateKey" placeholder="-----BEGIN OPENSSH PRIVATE KEY-----&#10;...&#10;-----END OPENSSH PRIVATE KEY-----" rows="7"></textarea>
        </div>
        <button type="submit" class="btn-connect">Save Key</button>
      </form>
    </div>

    <!-- SFTP file browser sheet -->
    <div class="sheet sheet--sftp" id="sftpSheet" role="dialog" aria-modal="true" aria-label="Files" hidden>
      <div class="sheet-handle"></div>
      <div class="sheet-head">
        <h2 class="sheet-title">Files</h2>
        <span class="sftp-path" id="sftpPath">~</span>
        <button type="button" class="btn-x" id="closeSftpSheet" aria-label="Close">
          <svg width="12" height="12" viewBox="0 0 12 12" fill="currentColor">
            <path d="M1.5 1.5l9 9M10.5 1.5l-9 9" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
          </svg>
        </button>
      </div>
      <div class="sftp-toolbar">
        <button type="button" class="sftp-action-btn" id="sftpUpBtn">↑ Up</button>
        <label class="sftp-action-btn" for="sftpFileInput">⬆ Upload</label>
        <input type="file" id="sftpFileInput" hidden multiple />
      </div>
      <div class="sftp-list" id="sftpList">
        <div class="sftp-loading">Loading…</div>
      </div>
    </div>

    <!-- Top HUD bar -->
    <header class="hud" id="hud" hidden>
      <div class="hud-left">
        <div class="dot" id="statusDot" aria-hidden="true"></div>
        <span class="hud-host" id="hudHost"></span>
      </div>
      <div class="hud-actions">
        <button type="button" class="action-btn" data-send="&#x3;" title="Ctrl-C">⌃C</button>
        <button type="button" class="action-btn" data-send="&#x1b;" title="Escape">Esc</button>
        <button type="button" class="action-btn" data-send="&#x9;" title="Tab">⇥</button>
        <button type="button" class="action-btn" id="pasteBtn" title="Paste">Paste</button>
        <button type="button" class="action-btn" id="filesBtn" title="Browse files" hidden>Files</button>
        <button type="button" class="action-btn action-btn--close" id="disconnectBtn" aria-label="Disconnect">✕</button>
      </div>
    </header>

    <!-- Tab bar -->
    <div class="tab-bar" id="tabBar" hidden>
      <div class="tab-list" id="tabList"></div>
      <button type="button" class="tab-new" id="newTabBtn" aria-label="New tab" title="New connection">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
          <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
        </svg>
      </button>
    </div>

    <!-- Terminal workspace -->
    <main class="workspace" id="workspace">
      <div id="termContainer"></div>
    </main>

    <!-- Mobile control bar -->
    <div class="mbar" id="mbar" hidden>
      <div class="mbar-keys" id="mbarKeys">
        <button class="mkey" data-send="&#x3;">⌃C</button>
        <button class="mkey" data-send="&#x1b;">Esc</button>
        <button class="mkey" data-send="&#x1;">⌃A</button>
        <button class="mkey" data-send="&#x5;">⌃E</button>
        <button class="mkey" data-send="&#x9;">Tab</button>
        <button class="mkey" data-send="&#x1b;[A">↑</button>
        <button class="mkey" data-send="&#x1b;[B">↓</button>
        <button class="mkey" data-send="&#x1b;[C">→</button>
        <button class="mkey" data-send="&#x1b;[D">←</button>
        <button class="mkey" data-send="&#x7f;">⌫</button>
      </div>
      <form class="mbar-cmd" id="cmdForm" autocomplete="off">
        <input type="text" class="cmd-input" id="cmdInput"
          placeholder="Type command…"
          autocapitalize="none" autocorrect="off" autocomplete="off" spellcheck="false" />
        <button type="submit" class="cmd-send" aria-label="Send">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="22" y1="2" x2="11" y2="13"/>
            <polygon points="22 2 15 22 11 13 2 9 22 2"/>
          </svg>
        </button>
      </form>
    </div>

    <script type="module" src="/client.js"></script>
  </body>
</html>
