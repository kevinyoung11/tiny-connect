name: Auto PR

on:
  push:
    branches:
      - "feature/**"
      - "fix/**"
      - "codex/**"

permissions:
  contents: read
  pull-requests: write

jobs:
  create-pr:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create pull request
        env:
          GH_TOKEN: ${{ secrets.AUTO_PR_TOKEN || github.token }}
          BRANCH_NAME: ${{ github.ref_name }}
        run: |
          existing_pr=$(gh pr list \
            --head "$BRANCH_NAME" \
            --base main \
            --state open \
            --json number \
            --jq '.[0].number')

          if [ -n "$existing_pr" ]; then
            echo "PR already exists: #$existing_pr"
            exit 0
          fi

          gh pr create \
            --base main \
            --head "$BRANCH_NAME" \
            --title "Auto PR: $BRANCH_NAME" \
            --body "Automatically created from push to \`$BRANCH_NAME\`."
